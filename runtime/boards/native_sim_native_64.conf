# Fake metal (native_sim): no MMU — picolibc cannot use an SRAM tail (ARENA_SIZE=-1
# touches unmapped host ELF bytes and segfaults). Use an in-link arena instead.
#
# Size must cover machine RAM minus the link footprint without this arena; regenerate
# after layout changes (≈ CONFIG_SRAM_SIZE * 1024 − link_bytes_without_arena).
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=92194176
