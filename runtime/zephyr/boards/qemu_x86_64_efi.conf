# qemu_x86_64 EFI payload (VirtualBox + QEMU UEFI via OVMF + FAT disk).
# Machine RAM probe: pymergetic port/efi_ram.c (vanilla Zephyr — no tree patches).
# CONFIG_SRAM_SIZE below is the kernel link map window only — not machine RAM.
# CONFIG_QEMU_UEFI_BOOT is intentionally off: it requires uefi-run at cmake time.
# Use scripts/pack-vbox-disk.sh output with OVMF or VirtualBox EFI instead.

CONFIG_BUILD_OUTPUT_EFI=y
# CONFIG_ACPI is not set
# CONFIG_PM_USERSPACE_BLOB_MEMTEST is not set
CONFIG_SRAM_SIZE=98304

CONFIG_KERNEL_VM_SIZE=0x40000000
# CONFIG_MULTIBOOT_MEMMAP is not set
