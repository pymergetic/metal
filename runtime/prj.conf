# pymergetic-metal runtime — mirrored Kconfig (native_sim == qemu_x86_64)
#
# No board overlays. No qemu-only options (GLIBCXX, EXTERNAL_LIBCPP, toolchain picolibc).
# Fake and real metal share the same embedded stack; custom app allocation replaces this
# interim picolibc arena once the app heap lands (Phase 2 in REQUIREMENTS.md).

# --- Picolibc (embedded C; never host EXTERNAL_LIBC) ---
CONFIG_PICOLIBC=y
# CONFIG_EXTERNAL_LIBC is not set
CONFIG_PICOLIBC_USE_MODULE=y

CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_PICOLIBC_LOCALE_INFO=y
CONFIG_PICOLIBC_LOCALE_EXTENDED_INFO=y
CONFIG_PICOLIBC_MULTIBYTE=y
CONFIG_PICOLIBC_ASSERT_VERBOSE=y

CONFIG_STDOUT_CONSOLE=y

# Interim dynamic allocation cap (picolibc/common heap); route through app arena later.
CONFIG_COMMON_LIBC_MALLOC=y
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=1048576

# --- POSIX (PSE51-class + VFS/fd layer) ---
CONFIG_POSIX_API=y

# --- C++ (minimal on both — no STL/exceptions/RTTI; vtables/new/delete only) ---
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_MINIMAL_LIBCPP=y
# CONFIG_GLIBCXX_LIBCPP is not set
# CONFIG_EXTERNAL_LIBCPP is not set
