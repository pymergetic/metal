# pymergetic-metal runtime — shared Kconfig; board conf overrides fake vs real metal malloc

# --- Picolibc (embedded C; never host EXTERNAL_LIBC) ---
CONFIG_PICOLIBC=y
# CONFIG_EXTERNAL_LIBC is not set
CONFIG_PICOLIBC_USE_MODULE=y

CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_PICOLIBC_LOCALE_INFO=y
CONFIG_PICOLIBC_LOCALE_EXTENDED_INFO=y
CONFIG_PICOLIBC_MULTIBYTE=y
CONFIG_PICOLIBC_ASSERT_VERBOSE=y

CONFIG_STDOUT_CONSOLE=y

# --- POSIX ---
CONFIG_POSIX_API=y

# --- memory ---
# k_malloc pool (inside kernel link; reduces malloc tail)
CONFIG_HEAP_MEM_POOL_SIZE=4194304
CONFIG_SYS_HEAP_RUNTIME_STATS=y
# Real metal: malloc/free -> dynamic SRAM tail (_end .. sram end)
CONFIG_COMMON_LIBC_MALLOC=y
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=-1
# Real metal: `prj.conf` tail + `runtime/boards/qemu_x86_64.conf` (KERNEL_VM_SIZE)

# --- C++ (minimal; vtables/new/delete only) ---
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_MINIMAL_LIBCPP=y
# CONFIG_GLIBCXX_LIBCPP is not set
# CONFIG_EXTERNAL_LIBCPP is not set
