# Pymergetic Metal — Zephyr runtime.
# Board profiles extended via EXTRA_CONF_FILE in scripts/build zephyr <subplatform>.

CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_USE_MODULE=y
CONFIG_PICOLIBC_IO_FLOAT=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_MAIN_STACK_SIZE=262144
CONFIG_HEAP_MEM_POOL_SIZE=1048576
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_POSIX_API=y
CONFIG_POSIX_TIMERS=y
CONFIG_POSIX_THREADS=y

# WASI preview1 sockets (TCP/UDP/IPv4/IPv6 + getaddrinfo) via wasi/socket.c.
CONFIG_NETWORKING=y
CONFIG_NET_TEST=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV6_DAD=n
CONFIG_NET_IPV6_ND=n
CONFIG_NET_IPV6_MLD=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_MAX_CONN=16
CONFIG_NET_PKT_RX_COUNT=24
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=48
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_CONTEXT_SNDTIMEO=y
CONFIG_NET_CONTEXT_RCVBUF=y
CONFIG_NET_CONTEXT_SNDBUF=y
CONFIG_DNS_RESOLVER=y
# Files + zsock fds share ZVFS; keep headroom above WASI open table.
CONFIG_ZVFS_OPEN_MAX=64

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_NUM_FILES=64
CONFIG_FS_FATFS_NUM_DIRS=32
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_BLK_DEV=y
CONFIG_FS_LITTLEFS_CACHE_SIZE=512
CONFIG_FS_LITTLEFS_READ_SIZE=512
CONFIG_FS_LITTLEFS_PROG_SIZE=512
CONFIG_FS_LITTLEFS_LOOKAHEAD_SIZE=64
CONFIG_FS_LITTLEFS_NUM_FILES=8
CONFIG_FS_LITTLEFS_NUM_DIRS=8
# RNG: native_sim has zephyr,native-sim-rng (FAKE_ENTROPY). Boards without a
# real entropy driver (qemu_x86_64) set CONFIG_TEST_RANDOM_GENERATOR in their
# board .conf — keeps the CMake "not truly random" warning off native_sim.

CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_RAM=y

CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_PRINTK=y

CONFIG_STACK_SENTINEL=y
CONFIG_STATIC_INIT_GNU=y

CONFIG_PM_METAL_ARENA_ALIGN=4096
# native_sim WAMR pool: kheap (~256 MiB) + bytecode (~64 MiB) + headroom
CONFIG_PM_METAL_STATIC_POOL_BYTES=536870912
CONFIG_PM_METAL_VERIFY_MODS=y
