# native_sim — fake metal: DT SRAM cap, fast local smoke
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=n
CONFIG_SRAM_SIZE=131072

# Loopback for WASI socket pair tests (t10–t28). Metal net/{dns,udp,http}
# uses host libc via port/host_*_adapt.c (no TAP / NSOS required).
CONFIG_NET_LOOPBACK=y
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_TEST=y
