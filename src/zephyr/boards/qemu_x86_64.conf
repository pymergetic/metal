# qemu_x86_64 — probe installed RAM via multiboot E820
CONFIG_KERNEL_VM_SIZE=0x40000000
CONFIG_MULTIBOOT_MEMMAP=y
# Link-time RAM region (KB) — must fit python.wasm + stdlib populate embeds
CONFIG_SRAM_SIZE=524288
# e1000 is in board DT (qemu_x86.dts); needs PCIE + user-net (SLIRP).
CONFIG_PCIE=y
CONFIG_ETH_E1000=y
CONFIG_NET_QEMU_USER=y
CONFIG_NET_QEMU_USER_EXTRA_ARGS="net=10.0.2.0/24,dhcpstart=10.0.2.15"
# Image + 128 MiB FAT + ~320 MiB WAMR arena for python guest
CONFIG_QEMU_EXTRA_FLAGS="-m 1G"
# mbedTLS SSL buffers + cert parse need a generous system heap on qemu.
CONFIG_HEAP_MEM_POOL_SIZE=8388608
# No entropy DT on this board — allow timer-based RNG for net/DNS smoke.
CONFIG_TEST_RANDOM_GENERATOR=y

# Keep loopback for WASI socket pair tests; e1000 for outbound Metal net.
# net_config AUTO_INIT picks the first iface (often loopback) — disable it and
# bind 10.0.2.15/gw onto ethernet from main (see main.c).
CONFIG_NET_LOOPBACK=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_DEFAULT_IF_ETHERNET=y
CONFIG_NET_TEST=n
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="10.0.2.15"
CONFIG_NET_CONFIG_MY_IPV4_GW="10.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="10.0.2.3"
# Extra packet buffers / contexts for concurrent DNS + NTP + TLS on e1000.
CONFIG_NET_MAX_CONTEXTS=32
CONFIG_NET_MAX_CONN=32
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
